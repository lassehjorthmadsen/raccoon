project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.md"
    - "reference/*.qmd"
    - "!training_research.qmd"
    - "!plan.md"
    - "!matches/**"

website:
  title: "Raccoon"
  description: "AlphaZero-style backgammon AI"
  repo-url: https://github.com/lassehjorthmadsen/raccoon
  repo-actions: [issue]
  navbar:
    left:
      - text: "Home"
        file: index.qmd
      - text: "Concepts"
        menu:
          - text: "MCTS Explained"
            file: mcts_explained.md
          - text: "Architecture"
            file: architecture.md
      - text: "Training"
        menu:
          - text: "Parameters"
            file: training_parameters.md
          - text: "Self-Play Analysis"
            file: training_analysis.qmd
          - text: "Supervised & Expert Iteration"
            file: pretraining_analysis.qmd
      - text: "Developer"
        file: gcp_guide.md
      - text: "Reference"
        file: reference/index.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true

execute:
  freeze: auto

jupyter: python3

quartodoc:
  package: raccoon
  source_dir: ..
  dir: reference
  title: "API Reference"
  sections:
    - title: "Environment"
      desc: "OpenSpiel wrapper, board encoder, and action masking"
      contents:
        - env.game_wrapper
        - env.encoder
        - env.actions
    - title: "Model"
      desc: "ResNet policy-value network"
      contents:
        - model.network
    - title: "Search"
      desc: "MCTS with chance-node handling"
      contents:
        - search.mcts
    - title: "Training"
      desc: "Self-play loop, replay buffer, and coach"
      contents:
        - train.self_play
        - train.replay_buffer
        - train.coach
    - title: "Evaluation"
      desc: "Checkpoint arena and GNUBG benchmark"
      contents:
        - eval.arena
        - eval.gnubg_harness
    - title: "Protocol"
      desc: "Raccoon Game Protocol (RGP)"
      contents:
        - protocol.rgp
