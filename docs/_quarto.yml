project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.md"
    - "!training_research.qmd"
    - "!plan.md"
    - "!matches/**"

website:
  title: "Raccoon"
  description: "AlphaZero-style backgammon AI"
  repo-url: https://github.com/lassehjorthmadsen/raccoon
  repo-actions: [issue]
  navbar:
    left:
      - text: "Home"
        file: index.qmd
      - text: "Concepts"
        menu:
          - text: "MCTS Explained"
            file: mcts_explained.md
          - text: "Architecture"
            file: architecture.md
      - text: "Training"
        menu:
          - text: "Parameters"
            file: training_parameters.md
          - text: "Analysis"
            file: training_analysis.qmd
      - text: "Developer"
        file: gcp_guide.md

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true

execute:
  freeze: auto

jupyter: python3
